<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CryptoTrade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --dark-bg: #0f0f23;
            --card-bg: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #667eea;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--dark-bg);
            color: var(--text-primary);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0f0f23, #1a1a2e, #16213e);
        }
        
        .auth-container { width: 100%; max-width: 450px; padding: 2rem; }
        
        .auth-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid rgba(102, 126, 234, 0.2);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .auth-logo { text-align: center; margin-bottom: 2rem; }
        
        .auth-logo a {
            font-size: 2rem;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        
        .auth-title { text-align: center; margin-bottom: 0.5rem; font-size: 1.5rem; }
        .auth-subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 2rem; }
        
        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            padding: 0.875rem 1rem;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            color: white;
        }
        
        .btn-primary-gradient {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 0.875rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            width: 100%;
        }
        
        .btn-primary-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
        
        .auth-footer { text-align: center; margin-top: 1.5rem; color: var(--text-secondary); }
        .auth-footer a { color: var(--accent); text-decoration: none; }
        
        .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-right: none;
            color: var(--text-secondary);
        }
        
        .input-group .form-control { border-left: none; }
        
        .alert { border-radius: 10px; border: none; }
        .alert-success { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <a href="/"><i class="fas fa-coins me-2"></i>CryptoTrade</a>
            </div>
            
            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-subtitle">Enter your email to receive reset instructions</p>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success mb-3">{{ message }}</div>
                {% endfor %}
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label text-muted">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary-gradient">
                    <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                </button>
            </form>
            
            <div class="auth-footer">
                Remember your password? <a href="{% url 'login' %}">Sign in</a>
            </div>
        </div>
        
        <div class="text-center mt-4">
            <a href="/" class="text-muted text-decoration-none">
                <i class="fas fa-arrow-left me-2"></i>Back to Home
            </a>
        </div>
    </div>
</body>
</html>
